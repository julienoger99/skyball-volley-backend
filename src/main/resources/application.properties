spring.application.name=skyball-volley
# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/skyballvolley_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# --- JWT Config ---
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.issuer=SkyballVolley API
security.jwt.expiration-seconds=86400
# --- Jackson ---
spring.jackson.default-property-inclusion=non_empty
# --- OpenAPI Config ---
# --- Mail ---
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:noreply}
spring.mail.password=${SPRING_MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# --- App ---
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.api.base-path=/api/v1
app.mail.from=${MAIL_FROM:noreply@skyball-volley.fr}
# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

